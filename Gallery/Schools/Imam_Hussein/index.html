<style>
/* --- استایل کارت‌ها مشابه سایت قبلی --- */
.folder-list {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    margin-top: 20px;
}

.folder {
    width: 250px; /* افزایش عرض کارت */
    text-align: center;
    border: 1px solid #ccc;
    padding: 10px;
    border-radius: 8px;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
}

.folder:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.folder img {
    width: 100%;
    height: 180px; /* افزایش ارتفاع عکس */
    object-fit: cover;
    border-radius: 6px;
}

.folder p {
    margin-top: 8px;
    font-weight: bold;
}

/* مودال برای بزرگنمایی عکس */
.modal {
    display: none;
    position: fixed;
    z-index: 9999;
    padding-top: 60px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.95);
}

.modal-content {
    margin: auto;
    display: block;
    max-width: 80%;
    max-height: 80%;
    border-radius: 8px;
}

.close {
    position: absolute;
    top: 20px;
    right: 35px;
    color: #fff;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
}
.close:hover { color: #bbb; }

/* دکمه برگشت به Photo Gallery */
.back-button {
    display: inline-block;
    margin: 20px auto;
    padding: 10px 20px;
    background-color: #0073e6;
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
    transition: background-color 0.2s;
}

.back-button:hover {
    background-color: #005bb5;
}
</style>
