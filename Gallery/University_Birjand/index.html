<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University of Bremen Photos</title>
<style>
body { font-family: Trebuchet MS, sans-serif; margin:20px; }
h2 { margin-bottom:20px; }
.gallery { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:15px; }
.gallery img { width:100%; height:150px; object-fit:cover; border-radius:6px; cursor:pointer; transition:transform 0.3s; }
.gallery img:hover { transform: scale(1.05); }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; padding-top:60px; }
.modal-content { margin:auto; display:block; max-width:80%; max-height:80%; }
.close { position:absolute; top:15px; right:35px; color:white; font-size:40px; font-weight:bold; cursor:pointer; }
.close:hover { color:#bbb; }
</style>
</head>
<body>

<h2>University of Bremen</h2>
<div class="gallery">
  <img src="Images/examday.jpg" alt="Meeting with Nico and Kishan" onclick="openModal('Images/examday.jpg')">
  <img src="Images/cause.jpg" alt="Opening Symposium" onclick="openModal('Images/cause.jpg')">
  <img src="Images/CAUSE-NOV.jpg" alt="DFG CAUSE Meeting" onclick="openModal('Images/CAUSE-NOV.jpg')">
  <img src="Images/summer.jpg" alt="Summer School Rennes" onclick="openModal('Images/summer.jpg')">
  <img src="Images/my students.jpg" alt="Group Photo Software Project" onclick="openModal('Images/my students.jpg')">
</div>

<div id="myModal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <img class="modal-content" id="modalImg">
</div>

<script>
function openModal(src){
  document.getElementById('myModal').style.display='block';
  document.getElementById('modalImg').src=src;
}
function closeModal(){
  document.getElementById('myModal').style.display='none';
}
</script>

</body>
</html>
